name: Build NP2 Kernel

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      kernel_repo:
        description: "Kernel source repo"
        required: false
        type: string
        default: "https://github.com/NothingOSS/android_kernel_msm-5.10_nothing_sm8475.git"
      kernel_branch:
        description: "Kernel branch"
        required: false
        type: string
        default: "sm8475/b/mr"
      kernel_defconfig:
        description: "Base defconfig (relative to arch/arm64/configs/)"
        required: false
        type: string
        default: "gki_defconfig"
      extra_configs:
        description: "Extra config fragments (space-separated, relative to arch/arm64/configs/)"
        required: false
        type: string
        default: "vendor/waipio_GKI.config"

  workflow_call:
    inputs:
      kernel_repo:
        required: false
        type: string
        default: "https://github.com/NothingOSS/android_kernel_msm-5.10_nothing_sm8475.git"
      kernel_branch:
        required: false
        type: string
        default: "sm8475/b/mr"
      kernel_defconfig:
        required: false
        type: string
        default: "gki_defconfig"
      extra_configs:
        required: false
        type: string
        default: "vendor/waipio_GKI.config"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: WKSU-SUSFS
            susfs: true
          - variant: WKSU
            susfs: false

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential bc bison flex libelf-dev libssl-dev \
            lz4 zip python3 clang llvm lld gcc-aarch64-linux-gnu perl

      - name: Clone sources
        run: |
          # Kernel
          git clone --depth=1 -b "${{ inputs.kernel_branch || 'sm8475/b/mr' }}" \
            "${{ inputs.kernel_repo || 'https://github.com/NothingOSS/android_kernel_msm-5.10_nothing_sm8475.git' }}" \
            kernel

          # AnyKernel3
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git
          rm -rf AnyKernel3/.git

          # SUSFS (only for SUSFS variant) - try latest(dev) first, fallback to stable
          if [ "${{ matrix.susfs }}" = "true" ]; then
            git clone --depth=1 -b gki-android13-5.10-dev https://gitlab.com/simonpunk/susfs4ksu.git \
              || git clone --depth=1 -b gki-android13-5.10 https://gitlab.com/simonpunk/susfs4ksu.git
          fi

      - name: Setup WKSU
        run: |
          cd kernel
          curl -LSs "https://raw.githubusercontent.com/WildKernels/Wild_KSU/wild/kernel/setup.sh" | bash -s canary

      - name: Apply SUSFS patches
        if: matrix.susfs
        run: |
          cd kernel

          cp ../susfs4ksu/kernel_patches/fs/* ./fs/
          cp ../susfs4ksu/kernel_patches/include/linux/* ./include/linux/

          PATCH_FILE="$(ls -1 ../susfs4ksu/kernel_patches/50_add_susfs_in_gki-android13-5.10*.patch 2>/dev/null | head -n1)"
          if [ -z "$PATCH_FILE" ]; then
            echo "ERROR: SUSFS patch file not found!"
            ls -la ../susfs4ksu/kernel_patches || true
            exit 1
          fi

          echo "Using SUSFS patch: $PATCH_FILE"
          patch -p1 < "$PATCH_FILE"

          # Safety net: ensure susfs.o is built
          sed -i 's/obj-$(CONFIG_KSU_SUSFS) += susfs.o/obj-y += susfs.o/' fs/Makefile
          grep -q 'susfs\.o' fs/Makefile || echo 'obj-y += susfs.o' >> fs/Makefile

      - name: Fix NothingOSS compile blockers + strip local -Werror
        run: |
          cd kernel

          # (A) Some vendor dirs force -Werror via Makefile/Kbuild. Strip it.
          if [ -d drivers/nothing_stability ]; then
            while IFS= read -r -d '' f; do
              sed -i 's/-Werror//g' "$f"
            done < <(find drivers/nothing_stability -type f \( -name 'Makefile' -o -name 'Kbuild' \) -print0)
          fi

          # (B) Fix known hard errors seen so far

          # 1) implicit-int (minidump_log.c)
          FILE1="drivers/soc/qcom/minidump_log.c"
          if [ -f "$FILE1" ] && grep -q 'static md_align_offset;' "$FILE1"; then
            sed -i 's/static md_align_offset;/static int md_align_offset;/' "$FILE1"
          fi

          # 2) strict-prototypes in drivers/misc/slot_status.c
          FILE2="drivers/misc/slot_status.c"
          if [ -f "$FILE2" ] && grep -q 'static int slot_parse_dt()' "$FILE2"; then
            sed -i 's/static int slot_parse_dt()/static int slot_parse_dt(void)/' "$FILE2"
          fi

          # 3) strict-prototypes in nothing_stability (auto-fix: "name() {" -> "name(void) {")
          #    제한 범위: drivers/nothing_stability/*.c 만
          if [ -d drivers/nothing_stability ]; then
            while IFS= read -r -d '' cfile; do
              perl -0777 -pi -e 's/(\bstatic\s+[^;{}()]*\b[A-Za-z_][A-Za-z0-9_]*\s*)\(\s*\)\s*\{/$1(void) {/g' "$cfile"
            done < <(find drivers/nothing_stability -type f -name '*.c' -print0)
          fi

          # Show remaining -Werror in those dirs (should be empty)
          echo "--- Remaining -Werror hits (should be none in nothing_stability) ---"
          (grep -RIn -- '-Werror' drivers/nothing_stability 2>/dev/null || true)

      - name: Configure kernel
        env:
          MAKE_ARGS: >-
            ARCH=arm64
            CROSS_COMPILE=aarch64-linux-gnu-
            LLVM=1 LLVM_IAS=1
            LD=ld.lld HOSTLD=ld.lld
            CC=clang CXX=clang++
            O=out
        run: |
          cd kernel

          BASE_DEF="${{ inputs.kernel_defconfig || 'gki_defconfig' }}"
          BASE_PATH="./arch/arm64/configs/${BASE_DEF}"

          if [ ! -f "$BASE_PATH" ]; then
            echo "ERROR: Base defconfig not found: $BASE_PATH"
            exit 1
          fi

          # Create private defconfig (don't mutate upstream)
          NP2_DEF="np2_defconfig"
          NP2_PATH="./arch/arm64/configs/${NP2_DEF}"
          cp "$BASE_PATH" "$NP2_PATH"

          EXTRA="${{ inputs.extra_configs }}"
          if [ -n "$EXTRA" ]; then
            for frag in $EXTRA; do
              FRAG_PATH="./arch/arm64/configs/$frag"
              if [ -f "$FRAG_PATH" ]; then
                echo "Merging: $frag"
                cat "$FRAG_PATH" >> "$NP2_PATH"
              else
                echo "Skip (not found): $frag"
              fi
            done
          fi

          # Seed KSU/SUSFS
          echo "CONFIG_KSU=y" >> "$NP2_PATH"
          if [ "${{ matrix.susfs }}" = "true" ]; then
            echo "CONFIG_KSU_SUSFS=y" >> "$NP2_PATH"
            echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> "$NP2_PATH"
            echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y" >> "$NP2_PATH"
            echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y" >> "$NP2_PATH"
            echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y" >> "$NP2_PATH"
            echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y" >> "$NP2_PATH"
            echo "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y" >> "$NP2_PATH"
            echo "CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y" >> "$NP2_PATH"
            echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y" >> "$NP2_PATH"
            echo "CONFIG_KSU_SUSFS_SUS_MAP=y" >> "$NP2_PATH"
          else
            echo "CONFIG_KSU_SUSFS=n" >> "$NP2_PATH"
          fi

          make $MAKE_ARGS "$NP2_DEF"

          # Force-set configs via scripts/config
          KCFG="./scripts/config --file out/.config"
          $KCFG -e KSU
          if [ "${{ matrix.susfs }}" = "true" ]; then
            $KCFG -e KSU_SUSFS
            $KCFG -e KSU_SUSFS_SUS_PATH
            $KCFG -e KSU_SUSFS_SUS_MOUNT
            $KCFG -e KSU_SUSFS_SUS_KSTAT
            $KCFG -e KSU_SUSFS_SPOOF_UNAME
            $KCFG -e KSU_SUSFS_ENABLE_LOG
            $KCFG -e KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS
            $KCFG -e KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG
            $KCFG -e KSU_SUSFS_OPEN_REDIRECT
            $KCFG -e KSU_SUSFS_SUS_MAP
          else
            $KCFG -d KSU_SUSFS
          fi

          make $MAKE_ARGS olddefconfig

          echo "--- Config verification ---"
          grep -E 'CONFIG_KSU=|CONFIG_KSU_SUSFS=' out/.config || true

          # Remove -dirty suffix
          [ -f scripts/setlocalversion ] && sed -i 's/-dirty//g' scripts/setlocalversion || true

      - name: Upload .config for debugging
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: config-NP2-${{ matrix.variant }}
          path: kernel/out/.config
          include-hidden-files: true
          if-no-files-found: warn
          retention-days: 7

      - name: Enable swap space
        run: |
          sudo swapoff /swapfile 2>/dev/null || true
          sudo rm -f /swapfile
          sudo fallocate -l 12G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile

      - name: Build kernel (Image only, no dtbs, no Werror)
        run: |
          cd kernel
          JOBS=$(( $(nproc) / 2 ))
          [ "$JOBS" -lt 1 ] && JOBS=1

          # WERROR=0 handles global, KCFLAGS handles per-dir injected -Werror and strict-prototypes.
          make -j$JOBS \
            ARCH=arm64 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            LLVM=1 LLVM_IAS=1 \
            LD=ld.lld HOSTLD=ld.lld \
            CC=clang CXX=clang++ \
            O=out \
            WERROR=0 \
            KCFLAGS="-Wno-error -Wno-error=strict-prototypes -Wno-strict-prototypes" \
            Image Image.gz modules

      - name: Export kernel image (.img)
        if: always()
        run: |
          mkdir -p out_artifacts
          if [ -f kernel/out/arch/arm64/boot/Image ]; then
            cp kernel/out/arch/arm64/boot/Image out_artifacts/kernel.img
          else
            echo "kernel Image not found" > out_artifacts/BUILD_FAILED.txt
          fi
          if [ -f kernel/out/arch/arm64/boot/Image.gz ]; then
            cp kernel/out/arch/arm64/boot/Image.gz out_artifacts/kernel.img.gz
          fi

      - name: Upload kernel image artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kernel-img-${{ matrix.variant }}
          path: out_artifacts/*
          if-no-files-found: warn
          retention-days: 30

      - name: Package AnyKernel3
        run: |
          if [ ! -f kernel/out/arch/arm64/boot/Image ]; then
            echo "ERROR: kernel Image not found — build failed"
            exit 1
          fi

          cp kernel/out/arch/arm64/boot/Image AnyKernel3/
          cp kernel/out/arch/arm64/boot/Image.gz AnyKernel3/ 2>/dev/null || true

          cp Scripts/anykernel.sh AnyKernel3/anykernel.sh
          if [ "${{ matrix.susfs }}" = "true" ]; then
            sed -i 's/kernel.string=.*/kernel.string=NP2 Kernel - WKSU + SUSFS/' AnyKernel3/anykernel.sh
          else
            sed -i 's/kernel.string=.*/kernel.string=NP2 Kernel - WKSU/' AnyKernel3/anykernel.sh
          fi

          cd AnyKernel3
          ZIP_NAME="${{ matrix.variant }}-NP2-Pong.zip"
          zip -r "../$ZIP_NAME" ./*

      - name: Upload AnyKernel zip artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kernel-NP2-${{ matrix.variant }}
          path: "*.zip"
          if-no-files-found: warn
          retention-days: 30

      - name: Collect .rej files
        if: always()
        id: collect_rej
        run: |
          mkdir -p rej
          found="false"
          while IFS= read -r -d '' f; do
            found="true"
            mkdir -p "rej/$(dirname "$f")"
            cp "$f" "rej/$f"
            orig="${f%.rej}"
            [ -f "$orig" ] && cp "$orig" "rej/$orig"
          done < <(find . -name '*.rej' -print0)
          echo "found=$found" >> "$GITHUB_OUTPUT"

      - name: Upload .rej files
        if: always() && steps.collect_rej.outputs.found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: rej-NP2-${{ matrix.variant }}
          path: rej/
          if-no-files-found: warn
