name: Build NP2 Kernel

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      kernel_repo:
        description: 'Kernel source repo'
        required: false
        type: string
        default: 'https://github.com/LineageOS/android_kernel_nothing_sm8475.git'
      kernel_branch:
        description: 'Kernel branch'
        required: false
        type: string
        default: 'lineage-23.2'
      kernel_defconfig:
        description: 'Defconfig (relative to arch/arm64/configs/)'
        required: false
        type: string
        default: 'gki_defconfig'
      extra_configs:
        description: 'Extra config fragments to merge (space-separated, relative to arch/arm64/configs/)'
        required: false
        type: string
        default: 'vendor/waipio_GKI.config vendor/nothing/waipio_GKI.config'

  workflow_call:
    inputs:
      kernel_repo:
        required: false
        type: string
        default: 'https://github.com/LineageOS/android_kernel_nothing_sm8475.git'
      kernel_branch:
        required: false
        type: string
        default: 'lineage-23.2'
      kernel_defconfig:
        required: false
        type: string
        default: 'gki_defconfig'
      extra_configs:
        required: false
        type: string
        default: 'vendor/waipio_GKI.config vendor/nothing/waipio_GKI.config'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: WKSU-SUSFS
            susfs: true
          - variant: WKSU
            susfs: false

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/share/swift /usr/local/graalvm /usr/local/share/powershell
          sudo apt-get clean

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential bc bison flex libelf-dev libssl-dev \
            lz4 zip python3 clang llvm lld gcc-aarch64-linux-gnu

      - name: Clone sources
        run: |
          # Kernel
          git clone --depth=1 -b "${{ inputs.kernel_branch || 'lineage-23.2' }}" \
            "${{ inputs.kernel_repo || 'https://github.com/LineageOS/android_kernel_nothing_sm8475.git' }}" \
            kernel

          # AnyKernel3
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git
          rm -rf AnyKernel3/.git

          # SUSFS (only for SUSFS variant)
          if [ "${{ matrix.susfs }}" = "true" ]; then
            git clone --depth=1 -b gki-android13-5.10 \
              https://gitlab.com/simonpunk/susfs4ksu.git
          fi

      - name: Setup Wild_KSU
        run: |
          cd kernel
          curl -LSs "https://raw.githubusercontent.com/WildKernels/Wild_KSU/wild/kernel/setup.sh" | bash -s stable

      - name: Apply SUSFS patches
        if: matrix.susfs
        run: |
          cd kernel

          # Copy SUSFS source files
          cp ../susfs4ksu/kernel_patches/fs/* ./fs/
          cp ../susfs4ksu/kernel_patches/include/linux/* ./include/linux/

          # Apply kernel patch
          patch -p1 < ../susfs4ksu/kernel_patches/50_add_susfs_in_gki-android13-5.10.patch

          # Force susfs.o to compile unconditionally
          # The patch adds obj-$(CONFIG_KSU_SUSFS) but Kconfig may not propagate the symbol
          sed -i 's/obj-$(CONFIG_KSU_SUSFS) += susfs.o/obj-y += susfs.o/' fs/Makefile
          grep -q 'susfs\.o' fs/Makefile || echo 'obj-y += susfs.o' >> fs/Makefile

      - name: Configure kernel
        run: |
          cd kernel
          DEFCONFIG="./arch/arm64/configs/${{ inputs.kernel_defconfig || 'gki_defconfig' }}"

          # Merge extra config fragments into defconfig (if any)
          EXTRA="${{ inputs.extra_configs }}"
          if [ -n "$EXTRA" ]; then
            for frag in $EXTRA; do
              FRAG_PATH="./arch/arm64/configs/$frag"
              if [ -f "$FRAG_PATH" ]; then
                echo "Merging: $frag"
                cat "$FRAG_PATH" >> "$DEFCONFIG"
              fi
            done
          fi

          # KernelSU
          echo "CONFIG_KSU=y" >> "$DEFCONFIG"

          # SUSFS 2.0.0+
          if [ "${{ matrix.susfs }}" = "true" ]; then
            echo "CONFIG_KSU_SUSFS=y" >> "$DEFCONFIG"
            echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> "$DEFCONFIG"
            echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y" >> "$DEFCONFIG"
            echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y" >> "$DEFCONFIG"
            echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y" >> "$DEFCONFIG"
            echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y" >> "$DEFCONFIG"
            echo "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y" >> "$DEFCONFIG"
            echo "CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y" >> "$DEFCONFIG"
            echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y" >> "$DEFCONFIG"
            echo "CONFIG_KSU_SUSFS_SUS_MAP=y" >> "$DEFCONFIG"
          else
            echo "CONFIG_KSU_SUSFS=n" >> "$DEFCONFIG"
          fi

          # Remove -dirty suffix
          [ -f scripts/setlocalversion ] && sed -i 's/-dirty//g' scripts/setlocalversion || true

      - name: Enable swap space
        run: |
          # Remove existing swap file first
          sudo swapoff /swapfile 2>/dev/null || true
          sudo rm -f /swapfile
          sudo fallocate -l 12G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile

      - name: Build kernel
        run: |
          cd kernel
          # Reduce parallel jobs to prevent memory exhaustion
          JOBS=$(( $(nproc) / 2 ))
          [ "$JOBS" -lt 1 ] && JOBS=1

          make -j$JOBS \
            ARCH=arm64 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            LLVM=1 LLVM_IAS=1 \
            LD=ld.lld HOSTLD=ld.lld \
            CC=clang CXX=clang++ \
            O=out \
            "${{ inputs.kernel_defconfig || 'gki_defconfig' }}"

          # Verify critical configs survived defconfig processing
          echo "--- Checking .config for KSU/SUSFS symbols ---"
          grep -E 'CONFIG_KSU|CONFIG_KSU_SUSFS' out/.config || true

          make -j$JOBS \
            ARCH=arm64 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            LLVM=1 LLVM_IAS=1 \
            LD=ld.lld HOSTLD=ld.lld \
            CC=clang CXX=clang++ \
            KCFLAGS="-Wno-error" \
            O=out

      - name: Package AnyKernel3
        run: |
          # Verify build output exists
          if [ ! -f kernel/out/arch/arm64/boot/Image ]; then
            echo "ERROR: kernel Image not found — build failed"
            exit 1
          fi

          # Copy kernel image
          cp kernel/out/arch/arm64/boot/Image AnyKernel3/
          cp kernel/out/arch/arm64/boot/Image.gz AnyKernel3/ 2>/dev/null || true

          # Copy anykernel.sh from repo
          cp Scripts/anykernel.sh AnyKernel3/anykernel.sh

          # Create zip
          cd AnyKernel3
          ZIP_NAME="${{ matrix.variant }}-NP2-Pong.zip"
          zip -r "../$ZIP_NAME" ./*

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernel-NP2-${{ matrix.variant }}
          path: "*.zip"
          retention-days: 30

      - name: Collect .rej files
        if: always()
        id: collect_rej
        run: |
          mkdir -p rej
          found="false"
          while IFS= read -r -d '' f; do
            found="true"
            mkdir -p "rej/$(dirname "$f")"
            cp "$f" "rej/$f"
            orig="${f%.rej}"
            [ -f "$orig" ] && cp "$orig" "rej/$orig"
          done < <(find . -name '*.rej' -print0)
          echo "found=$found" >> "$GITHUB_OUTPUT"

      - name: Upload .rej files
        if: always() && steps.collect_rej.outputs.found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: rej-NP2-${{ matrix.variant }}
          path: rej/
