name: Build NP2 Kernel

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      kernel_repo:
        description: 'Kernel source repo'
        required: false
        type: string
        default: 'https://github.com/LineageOS/android_kernel_nothing_sm8475.git'
      kernel_branch:
        description: 'Kernel branch'
        required: false
        type: string
        default: 'lineage-23.2'
      kernel_defconfig:
        description: 'Defconfig (relative to arch/arm64/configs/)'
        required: false
        type: string
        default: 'gki_defconfig'
      extra_configs:
        description: 'Extra config fragments to merge (space-separated, relative to arch/arm64/configs/)'
        required: false
        type: string
        default: 'vendor/waipio_GKI.config vendor/nothing/waipio_GKI.config'

  workflow_call:
    inputs:
      kernel_repo:
        required: false
        type: string
        default: 'https://github.com/LineageOS/android_kernel_nothing_sm8475.git'
      kernel_branch:
        required: false
        type: string
        default: 'lineage-23.2'
      kernel_defconfig:
        required: false
        type: string
        default: 'gki_defconfig'
      extra_configs:
        required: false
        type: string
        default: 'vendor/waipio_GKI.config vendor/nothing/waipio_GKI.config'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: WKSU-SUSFS
            susfs: true
          - variant: WKSU
            susfs: false

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential bc bison flex libelf-dev libssl-dev \
            lz4 zip python3 clang llvm lld gcc-aarch64-linux-gnu

      - name: Clone sources
        run: |
          # Kernel
          git clone --depth=1 -b "${{ inputs.kernel_branch || 'lineage-23.2' }}" \
            "${{ inputs.kernel_repo || 'https://github.com/LineageOS/android_kernel_nothing_sm8475.git' }}" \
            kernel

          # AnyKernel3
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git
          rm -rf AnyKernel3/.git

          # SUSFS (only for SUSFS variant)
          if [ "${{ matrix.susfs }}" = "true" ]; then
            git clone --depth=1 -b gki-android13-5.10 \
              https://gitlab.com/simonpunk/susfs4ksu.git
          fi

      - name: Setup WKSU
        run: |
          cd kernel
          curl -LSs "https://raw.githubusercontent.com/WildKernels/Wild_KSU/wild/kernel/setup.sh" | bash -s canary

      - name: Apply SUSFS patches
        if: matrix.susfs
        run: |
          cd kernel

          # Copy SUSFS source files
          cp ../susfs4ksu/kernel_patches/fs/* ./fs/
          cp ../susfs4ksu/kernel_patches/include/linux/* ./include/linux/

          # Apply kernel patch
          patch -p1 < ../susfs4ksu/kernel_patches/50_add_susfs_in_gki-android13-5.10.patch

          # Safety net: force susfs.o into the build regardless of Kconfig resolution.
          # The Configure step uses scripts/config to guarantee CONFIG_KSU_SUSFS=y,
          # but obj-y avoids a silent empty-object link failure if it gets dropped.
          sed -i 's/obj-$(CONFIG_KSU_SUSFS) += susfs.o/obj-y += susfs.o/' fs/Makefile
          grep -q 'susfs\.o' fs/Makefile || echo 'obj-y += susfs.o' >> fs/Makefile

      - name: Configure kernel
        env:
          MAKE_ARGS: >-
            ARCH=arm64
            CROSS_COMPILE=aarch64-linux-gnu-
            LLVM=1 LLVM_IAS=1
            LD=ld.lld HOSTLD=ld.lld
            CC=clang CXX=clang++
            O=out
        run: |
          cd kernel
          DEFCONFIG="./arch/arm64/configs/${{ inputs.kernel_defconfig || 'gki_defconfig' }}"

          # Merge extra config fragments into defconfig (if any)
          EXTRA="${{ inputs.extra_configs }}"
          if [ -n "$EXTRA" ]; then
            for frag in $EXTRA; do
              FRAG_PATH="./arch/arm64/configs/$frag"
              if [ -f "$FRAG_PATH" ]; then
                echo "Merging: $frag"
                cat "$FRAG_PATH" >> "$DEFCONFIG"
              fi
            done
          fi

          # ── GKI module-compat: prevent vendor-module CRC / signature mismatches ──
          # KSU & SUSFS modify exported symbols → CRCs change → vendor modules
          # (display, modem, storage …) refuse to load → bootloop.
          echo "CONFIG_MODVERSIONS=n"       >> "$DEFCONFIG"
          echo "CONFIG_MODULE_SIG_FORCE=n"  >> "$DEFCONFIG"
          echo "CONFIG_MODULE_FORCE_LOAD=y" >> "$DEFCONFIG"
          echo "CONFIG_TRIM_UNUSED_KSYMS=n" >> "$DEFCONFIG"
          echo "CONFIG_UNUSED_SYMBOLS=y"    >> "$DEFCONFIG"

          # Seed KSU/SUSFS options into defconfig (scripts/config below is the real authority)
          echo "CONFIG_KSU=y" >> "$DEFCONFIG"
          if [ "${{ matrix.susfs }}" = "true" ]; then
            echo "CONFIG_KSU_SUSFS=y" >> "$DEFCONFIG"
            echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> "$DEFCONFIG"
            echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y" >> "$DEFCONFIG"
            echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y" >> "$DEFCONFIG"
            echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y" >> "$DEFCONFIG"
            echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y" >> "$DEFCONFIG"
            echo "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y" >> "$DEFCONFIG"
            echo "CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y" >> "$DEFCONFIG"
            echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y" >> "$DEFCONFIG"
            echo "CONFIG_KSU_SUSFS_SUS_MAP=y" >> "$DEFCONFIG"
          else
            echo "CONFIG_KSU_SUSFS=n" >> "$DEFCONFIG"
          fi

          # Generate initial .config from defconfig
          make $MAKE_ARGS "${{ inputs.kernel_defconfig || 'gki_defconfig' }}"

          # Force-set configs via scripts/config so Kconfig cannot silently drop them
          KCFG="./scripts/config --file out/.config"

          # ── GKI module-compat (critical for boot) ──
          $KCFG -d MODVERSIONS
          $KCFG -d MODULE_SIG_FORCE
          $KCFG -e MODULE_FORCE_LOAD
          $KCFG -d TRIM_UNUSED_KSYMS
          $KCFG -e UNUSED_SYMBOLS

          $KCFG -e KSU
          if [ "${{ matrix.susfs }}" = "true" ]; then
            $KCFG -e KSU_SUSFS
            $KCFG -e KSU_SUSFS_SUS_PATH
            $KCFG -e KSU_SUSFS_SUS_MOUNT
            $KCFG -e KSU_SUSFS_SUS_KSTAT
            $KCFG -e KSU_SUSFS_SPOOF_UNAME
            $KCFG -e KSU_SUSFS_ENABLE_LOG
            $KCFG -e KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS
            $KCFG -e KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG
            $KCFG -e KSU_SUSFS_OPEN_REDIRECT
            $KCFG -e KSU_SUSFS_SUS_MAP
          else
            $KCFG -d KSU_SUSFS
          fi

          # Resolve dependencies without dropping our forced configs
          make $MAKE_ARGS olddefconfig

          # Verify critical configs survived
          echo "--- Config verification ---"
          grep -E 'CONFIG_KSU=|CONFIG_KSU_SUSFS=' out/.config || true
          grep -E 'CONFIG_MODVERSIONS|CONFIG_MODULE_SIG_FORCE|CONFIG_MODULE_FORCE_LOAD|CONFIG_TRIM_UNUSED_KSYMS' out/.config || true
          if [ "${{ matrix.susfs }}" = "true" ]; then
            if ! grep -q 'CONFIG_KSU_SUSFS=y' out/.config; then
              echo "ERROR: CONFIG_KSU_SUSFS=y missing from final .config!"
              exit 1
            fi
          fi
          # Fail-safe: MODVERSIONS must be off or vendor modules won't load
          if grep -q 'CONFIG_MODVERSIONS=y' out/.config; then
            echo "ERROR: CONFIG_MODVERSIONS is still enabled — will cause bootloop!"
            exit 1
          fi

          # Remove -dirty suffix
          [ -f scripts/setlocalversion ] && sed -i 's/-dirty//g' scripts/setlocalversion || true

      - name: Enable swap space
        run: |
          # Remove existing swap file first
          sudo swapoff /swapfile 2>/dev/null || true
          sudo rm -f /swapfile
          sudo fallocate -l 12G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile

      - name: Build kernel
        run: |
          cd kernel
          # Reduce parallel jobs to prevent memory exhaustion
          JOBS=$(( $(nproc) / 2 ))
          [ "$JOBS" -lt 1 ] && JOBS=1

          make -j$JOBS \
            ARCH=arm64 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            LLVM=1 LLVM_IAS=1 \
            LD=ld.lld HOSTLD=ld.lld \
            CC=clang CXX=clang++ \
            KCFLAGS="-Wno-error" \
            O=out

      - name: Package AnyKernel3
        run: |
          # Verify build output exists
          if [ ! -f kernel/out/arch/arm64/boot/Image ]; then
            echo "ERROR: kernel Image not found — build failed"
            exit 1
          fi

          # Copy kernel image
          cp kernel/out/arch/arm64/boot/Image AnyKernel3/
          cp kernel/out/arch/arm64/boot/Image.gz AnyKernel3/ 2>/dev/null || true

          # Copy DTBs if the build produced any (safety net for GKI boot chain)
          if ls kernel/out/arch/arm64/boot/dts/vendor/qcom/*.dtb 1>/dev/null 2>&1; then
            mkdir -p AnyKernel3/dtb
            cp kernel/out/arch/arm64/boot/dts/vendor/qcom/*.dtb AnyKernel3/dtb/
            echo "Copied DTBs to AnyKernel3/dtb/"
          fi
          # Copy concatenated Image.gz-dtb if present
          cp kernel/out/arch/arm64/boot/Image.gz-dtb AnyKernel3/ 2>/dev/null || true

          # Copy anykernel.sh from repo and set variant kernel string
          cp Scripts/anykernel.sh AnyKernel3/anykernel.sh
          if [ "${{ matrix.susfs }}" = "true" ]; then
            sed -i 's/kernel.string=.*/kernel.string=NP2 Kernel - WKSU + SUSFS/' AnyKernel3/anykernel.sh
          else
            sed -i 's/kernel.string=.*/kernel.string=NP2 Kernel - WKSU/' AnyKernel3/anykernel.sh
          fi

          # Create zip
          cd AnyKernel3
          ZIP_NAME="${{ matrix.variant }}-NP2-Pong.zip"
          zip -r "../$ZIP_NAME" ./*

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernel-NP2-${{ matrix.variant }}
          path: "*.zip"
          retention-days: 30

      - name: Collect .rej files
        if: always()
        id: collect_rej
        run: |
          mkdir -p rej
          found="false"
          while IFS= read -r -d '' f; do
            found="true"
            mkdir -p "rej/$(dirname "$f")"
            cp "$f" "rej/$f"
            orig="${f%.rej}"
            [ -f "$orig" ] && cp "$orig" "rej/$orig"
          done < <(find . -name '*.rej' -print0)
          echo "found=$found" >> "$GITHUB_OUTPUT"

      - name: Upload .rej files
        if: always() && steps.collect_rej.outputs.found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: rej-NP2-${{ matrix.variant }}
          path: rej/
